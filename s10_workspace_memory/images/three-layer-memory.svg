<svg viewBox="0 0 680 560" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>WorkBuddy 记忆系统三层架构</title>
  <desc>展示云端记忆、用户级本地记忆和工作区记忆三层架构及其数据流</desc>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th{font:500 14px var(--font-sans,sans-serif);fill:var(--color-text-primary,#000)}
      .ts{font:400 12px var(--font-sans,sans-serif);fill:var(--color-text-secondary,#666)}
      .tc{font:400 11px var(--font-mono,monospace);fill:var(--color-text-tertiary,#888)}
    </style>
  </defs>

  <text class="th" x="340" y="30" text-anchor="middle" font-size="15">三层记忆系统</text>

  <rect x="30" y="50" width="620" height="130" rx="12" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text class="th" x="50" y="75">Layer 1 — 云端记忆 (Cloud Memory)</text>
  <text class="ts" x="50" y="92">服务器生成 · 会话启动时注入 &lt;memory&gt; 块 · 只读</text>
  <g class="c-blue">
    <rect x="50" y="105" width="180" height="56" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="140" y="125" text-anchor="middle" dominant-baseline="central">用户画像 Profile</text>
    <text class="ts" x="140" y="143" text-anchor="middle" dominant-baseline="central">~/.workbuddy/memory/*.md</text>
  </g>
  <g class="c-blue">
    <rect x="250" y="105" width="180" height="56" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="340" y="125" text-anchor="middle" dominant-baseline="central">历史召回</text>
    <text class="ts" x="340" y="143" text-anchor="middle" dominant-baseline="central">服务端相关性排序</text>
  </g>
  <g class="c-blue">
    <rect x="450" y="105" width="170" height="56" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="535" y="125" text-anchor="middle" dominant-baseline="central">memory RPC</text>
    <text class="ts" x="535" y="143" text-anchor="middle" dominant-baseline="central">通道化同步</text>
  </g>

  <path d="M340 180 L340 200" class="arr" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>
  <text class="ts" x="360" y="194">自动注入 / RPC 调用</text>

  <rect x="30" y="210" width="620" height="130" rx="12" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="th" x="50" y="235">Layer 2 — 用户级本地记忆 (User-level Local Memory)</text>
  <text class="ts" x="50" y="252">跨项目共享 · 4,000 字符/会话限制 · Edit 工具直接写入</text>
  <g class="c-teal">
    <rect x="50" y="265" width="280" height="56" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="th" x="190" y="285" text-anchor="middle" dominant-baseline="central">~/.workbuddy/MEMORY.md</text>
    <text class="ts" x="190" y="303" text-anchor="middle" dominant-baseline="central">长期偏好 · 跨项目规则</text>
  </g>
  <g class="c-teal">
    <rect x="350" y="265" width="270" height="56" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="th" x="485" y="285" text-anchor="middle" dominant-baseline="central">身份文件</text>
    <text class="ts" x="485" y="303" text-anchor="middle" dominant-baseline="central">persona / identity / user / bootstrap</text>
  </g>

  <path d="M340 340 L340 360" class="arr" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>
  <text class="ts" x="360" y="354">按项目隔离</text>

  <rect x="30" y="370" width="620" height="170" rx="12" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text class="th" x="50" y="395">Layer 3 — 工作区记忆 (Workspace Memory)</text>
  <text class="ts" x="50" y="412">仅当前项目 · 3,000 字符/会话 · 追加日志 + 策展笔记</text>
  <g class="c-amber">
    <rect x="50" y="425" width="280" height="52" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
    <text class="th" x="190" y="445" text-anchor="middle" dominant-baseline="central">YYYY-MM-DD.md</text>
    <text class="ts" x="190" y="463" text-anchor="middle" dominant-baseline="central">每日工作日志 · 仅追加</text>
  </g>
  <g class="c-amber">
    <rect x="350" y="425" width="270" height="52" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
    <text class="th" x="485" y="445" text-anchor="middle" dominant-baseline="central">MEMORY.md</text>
    <text class="ts" x="485" y="463" text-anchor="middle" dominant-baseline="central">策展长期项目笔记</text>
  </g>
  <g class="c-amber">
    <rect x="50" y="485" width="570" height="40" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="ts" x="335" y="505" text-anchor="middle" dominant-baseline="central">.workbuddy/memory/ — 30 天后蒸馏到 MEMORY.md，删除旧日志</text>
  </g>
</svg>
