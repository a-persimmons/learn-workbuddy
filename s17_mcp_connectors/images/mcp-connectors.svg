<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#202124"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a73e8"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#f8f9fa"/>

  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#202124">MCP 连接器生态</text>

  <!-- Central hub -->
  <circle cx="400" cy="240" r="60" fill="#1a73e8"/>
  <text x="400" y="235" text-anchor="middle" font-size="14" fill="white" font-weight="bold">MCP</text>
  <text x="400" y="252" text-anchor="middle" font-size="11" fill="#e8f0fe">Protocol Hub</text>

  <!-- Connector nodes around hub -->
  <!-- Top-left -->
  <rect x="80" y="90" width="110" height="40" rx="8" fill="#34a853"/>
  <text x="135" y="115" text-anchor="middle" font-size="12" fill="white" font-weight="bold">腾讯文档</text>
  <line x1="190" y1="120" x2="345" y2="200" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Top-center-left -->
  <rect x="210" y="90" width="110" height="40" rx="8" fill="#34a853"/>
  <text x="265" y="115" text-anchor="middle" font-size="12" fill="white" font-weight="bold">飞书 Lark</text>
  <line x1="310" y1="130" x2="380" y2="185" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Top-center-right -->
  <rect x="340" y="90" width="110" height="40" rx="8" fill="#34a853"/>
  <text x="395" y="115" text-anchor="middle" font-size="12" fill="white" font-weight="bold">GitHub</text>
  <line x1="400" y1="130" x2="400" y2="180" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Top-right -->
  <rect x="470" y="90" width="110" height="40" rx="8" fill="#34a853"/>
  <text x="525" y="115" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Notion</text>
  <line x1="510" y1="130" x2="430" y2="185" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Far top-right -->
  <rect x="600" y="90" width="110" height="40" rx="8" fill="#34a853"/>
  <text x="655" y="115" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Slack</text>
  <line x1="620" y1="130" x2="460" y2="205" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Left side -->
  <rect x="50" y="180" width="100" height="40" rx="8" fill="#7b1fa2"/>
  <text x="100" y="205" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Jira</text>
  <line x1="150" y1="200" x2="340" y2="235" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Right side -->
  <rect x="640" y="180" width="110" height="40" rx="8" fill="#7b1fa2"/>
  <text x="695" y="205" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Linear</text>
  <line x1="640" y1="200" x2="460" y2="235" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom connectors -->
  <rect x="80" y="300" width="110" height="40" rx="8" fill="#fbbc04"/>
  <text x="135" y="325" text-anchor="middle" font-size="12" fill="#202124" font-weight="bold">数据库</text>
  <line x1="190" y1="310" x2="345" y2="275" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="210" y="300" width="110" height="40" rx="8" fill="#fbbc04"/>
  <text x="265" y="325" text-anchor="middle" font-size="12" fill="#202124" font-weight="bold">文件系统</text>
  <line x1="310" y1="300" x2="380" y2="285" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="340" y="300" width="110" height="40" rx="8" fill="#fbbc04"/>
  <text x="395" y="325" text-anchor="middle" font-size="12" fill="#202124" font-weight="bold">API 服务</text>
  <line x1="400" y1="300" x2="400" y2="295" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="470" y="300" width="110" height="40" rx="8" fill="#fbbc04"/>
  <text x="525" y="325" text-anchor="middle" font-size="12" fill="#202124" font-weight="bold">浏览器</text>
  <line x1="510" y1="300" x2="430" y2="285" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="600" y="300" width="110" height="40" rx="8" fill="#fbbc04"/>
  <text x="655" y="325" text-anchor="middle" font-size="12" fill="#202124" font-weight="bold">更多连接器</text>
  <line x1="620" y1="310" x2="460" y2="275" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Protocol layer -->
  <rect x="100" y="365" width="600" height="30" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1"/>
  <text x="400" y="385" text-anchor="middle" font-size="12" fill="#1a73e8" font-weight="bold">MCP Protocol: tools/list (发现工具) + tools/call (调用工具)</text>

  <!-- Trust model -->
  <line x1="400" y1="395" x2="400" y2="415" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="150" y="420" width="220" height="35" rx="8" fill="#34a853"/>
  <text x="260" y="442" text-anchor="middle" font-size="13" fill="white" font-weight="bold">✓ Trust (信任 → 合并工具池)</text>

  <rect x="430" y="420" width="220" height="35" rx="8" fill="#ea4335"/>
  <text x="540" y="442" text-anchor="middle" font-size="13" fill="white" font-weight="bold">✗ Deny (拒绝 → 不加载)</text>

  <!-- Bottom note -->
  <rect x="100" y="470" width="600" height="25" rx="4" fill="#202124"/>
  <text x="400" y="487" text-anchor="middle" font-size="11" fill="white">多类连接器 · 标准化协议 · 信任模型控制安全边界 · 工具统一合并到 Agent 工具池</text>
</svg>
