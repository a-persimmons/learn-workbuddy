<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a73e8"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ea4335"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5f6368"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#34a853"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#202124">延迟加载两步调用</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#5f6368">ToolSearch → DeferExecuteTool：按需加载工具 Schema</text>

  <!-- VS Divider -->
  <line x1="395" y1="90" x2="395" y2="480" stroke="#dadce0" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="376" y="92" width="38" height="24" rx="12" fill="#202124"/>
  <text x="395" y="109" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">VS</text>

  <!-- ===== LEFT: Without deferred loading (上下文爆炸) ===== -->
  <rect x="30" y="92" width="345" height="388" rx="12" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5" opacity="0.5"/>
  <text x="202" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#ea4335">❌ 直接加载所有工具</text>

  <!-- Big context box overflowing -->
  <rect x="55" y="140" width="295" height="130" rx="8" fill="#ffffff" stroke="#ea4335" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="202" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#ea4335">上下文窗口 (Context)</text>

  <!-- Tool schemas packed inside -->
  <g font-size="9" font-family="monospace">
    <rect x="65" y="172" width="80" height="20" rx="4" fill="#fce8e6"/><text x="105" y="186" text-anchor="middle" fill="#ea4335">Read</text>
    <rect x="150" y="172" width="80" height="20" rx="4" fill="#fce8e6"/><text x="190" y="186" text-anchor="middle" fill="#ea4335">Write</text>
    <rect x="235" y="172" width="80" height="20" rx="4" fill="#fce8e6"/><text x="275" y="186" text-anchor="middle" fill="#ea4335">Edit</text>
    <rect x="65" y="196" width="80" height="20" rx="4" fill="#fce8e6"/><text x="105" y="210" text-anchor="middle" fill="#ea4335">Bash</text>
    <rect x="150" y="196" width="80" height="20" rx="4" fill="#fce8e6"/><text x="190" y="210" text-anchor="middle" fill="#ea4335">Glob</text>
    <rect x="235" y="196" width="80" height="20" rx="4" fill="#fce8e6"/><text x="275" y="210" text-anchor="middle" fill="#ea4335">Grep</text>
    <rect x="65" y="220" width="80" height="20" rx="4" fill="#fce8e6"/><text x="105" y="234" text-anchor="middle" fill="#ea4335">Notebook</text>
    <rect x="150" y="220" width="80" height="20" rx="4" fill="#fce8e6"/><text x="190" y="234" text-anchor="middle" fill="#ea4335">TaskCreate</text>
    <rect x="235" y="220" width="80" height="20" rx="4" fill="#fce8e6"/><text x="275" y="234" text-anchor="middle" fill="#ea4335">TaskUpdate</text>
    <rect x="65" y="244" width="80" height="20" rx="4" fill="#fce8e6"/><text x="105" y="258" text-anchor="middle" fill="#ea4335">WebFetch</text>
    <rect x="150" y="244" width="80" height="20" rx="4" fill="#fce8e6"/><text x="190" y="258" text-anchor="middle" fill="#ea4335">ImageGen</text>
    <rect x="235" y="244" width="80" height="20" rx="4" fill="#fce8e6"/><text x="275" y="258" text-anchor="middle" fill="#ea4335">...更多</text>
  </g>

  <!-- Explosion warning -->
  <rect x="55" y="285" width="295" height="50" rx="8" fill="#ea4335"/>
  <text x="202" y="308" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">💥 上下文爆炸</text>
  <text x="202" y="326" text-anchor="middle" font-size="11" fill="#ffd6d3">16+ 工具 Schema 占用大量 Token</text>

  <!-- Stats -->
  <rect x="55" y="350" width="140" height="40" rx="6" fill="#ffffff" stroke="#dadce0"/>
  <text x="125" y="367" text-anchor="middle" font-size="11" fill="#5f6368">Token 占用</text>
  <text x="125" y="383" text-anchor="middle" font-size="14" font-weight="700" fill="#ea4335">~50K+ tokens</text>

  <rect x="210" y="350" width="140" height="40" rx="6" fill="#ffffff" stroke="#dadce0"/>
  <text x="280" y="367" text-anchor="middle" font-size="11" fill="#5f6368">可用空间</text>
  <text x="280" y="383" text-anchor="middle" font-size="14" font-weight="700" fill="#ea4335">↓ 30%+</text>

  <text x="202" y="415" text-anchor="middle" font-size="11" fill="#5f6368" font-style="italic">无论是否使用，全部预加载</text>
  <text x="202" y="438" text-anchor="middle" font-size="20">😦</text>

  <!-- ===== RIGHT: With deferred loading (两步调用) ===== -->
  <rect x="425" y="92" width="345" height="388" rx="12" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5" opacity="0.5"/>
  <text x="597" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#34a853">✅ 延迟加载 (按需)</text>

  <!-- Step 1: ToolSearch -->
  <rect x="450" y="138" width="295" height="48" rx="8" fill="#1a73e8"/>
  <text x="597" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Step 1: ToolSearch</text>
  <text x="597" y="176" text-anchor="middle" font-size="11" fill="#d6e4ff">传入 query 搜索 → 返回匹配工具 schema</text>

  <!-- Arrow down -->
  <path d="M 597 188 L 597 210" fill="none" stroke="#34a853" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Tool box with deferred -->
  <rect x="460" y="215" width="275" height="60" rx="8" fill="#ffffff" stroke="#34a853" stroke-width="1.5"/>
  <text x="597" y="232" text-anchor="middle" font-size="11" fill="#5f6368">16+ 工具 (延迟注册)</text>
  <rect x="475" y="240" width="60" height="18" rx="4" fill="#e8f0fe"/><text x="505" y="253" text-anchor="middle" font-size="9" fill="#1a73e8">Read</text>
  <rect x="542" y="240" width="60" height="18" rx="4" fill="#e8f0fe"/><text x="572" y="253" text-anchor="middle" font-size="9" fill="#1a73e8">Write</text>
  <rect x="609" y="240" width="60" height="18" rx="4" fill="#e8f0fe"/><text x="639" y="253" text-anchor="middle" font-size="9" fill="#1a73e8">Bash</text>
  <rect x="676" y="240" width="50" height="18" rx="4" fill="#e8f0fe"/><text x="701" y="253" text-anchor="middle" font-size="9" fill="#1a73e8">...仅按需</text>

  <!-- Arrow down -->
  <path d="M 597 278 L 597 300" fill="none" stroke="#34a853" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Step 2: DeferExecuteTool -->
  <rect x="450" y="305" width="295" height="48" rx="8" fill="#34a853"/>
  <text x="597" y="325" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Step 2: DeferExecuteTool</text>
  <text x="597" y="343" text-anchor="middle" font-size="11" fill="#c6f6d5">加载 schema → 执行 → 返回结果</text>

  <!-- Arrow down -->
  <path d="M 597 356 L 597 378" fill="none" stroke="#34a853" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Result -->
  <rect x="470" y="383" width="255" height="38" rx="8" fill="#ffffff" stroke="#34a853" stroke-width="1.5"/>
  <text x="597" y="408" text-anchor="middle" font-size="13" font-weight="600" fill="#34a853">✓ 工具结果</text>

  <!-- Stats -->
  <rect x="450" y="435" width="140" height="36" rx="6" fill="#ffffff" stroke="#dadce0"/>
  <text x="520" y="452" text-anchor="middle" font-size="11" fill="#5f6368">Token 占用</text>
  <text x="520" y="466" text-anchor="middle" font-size="13" font-weight="700" fill="#34a853">~2K tokens</text>

  <rect x="605" y="435" width="140" height="36" rx="6" fill="#ffffff" stroke="#dadce0"/>
  <text x="675" y="452" text-anchor="middle" font-size="11" fill="#5f6368">可用空间</text>
  <text x="675" y="466" text-anchor="middle" font-size="13" font-weight="700" fill="#34a853">↑ 节省 95%</text>
</svg>
