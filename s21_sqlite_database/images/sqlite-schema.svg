<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#202124"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a73e8"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#f8f9fa"/>

  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#202124">SQLite 数据库架构</text>

  <!-- WAL mode indicator -->
  <rect x="550" y="40" width="220" height="30" rx="6" fill="#34a853"/>
  <text x="660" y="60" text-anchor="middle" font-size="12" fill="white" font-weight="bold">WAL Mode (Write-Ahead Logging)</text>

  <!-- Tables -->
  <!-- sessions -->
  <rect x="30" y="85" width="160" height="135" rx="8" fill="#1a73e8"/>
  <rect x="30" y="85" width="160" height="28" rx="8" fill="#1a73e8"/>
  <rect x="30" y="100" width="160" height="13" fill="#1a73e8"/>
  <text x="110" y="104" text-anchor="middle" font-size="13" fill="white" font-weight="bold">sessions</text>
  <text x="45" y="130" font-size="10" fill="#e8f0fe" font-family="monospace">id (PK)</text>
  <text x="45" y="146" font-size="10" fill="#e8f0fe" font-family="monospace">title</text>
  <text x="45" y="162" font-size="10" fill="#e8f0fe" font-family="monospace">cwd</text>
  <text x="45" y="178" font-size="10" fill="#e8f0fe" font-family="monospace">model</text>
  <text x="45" y="194" font-size="10" fill="#e8f0fe" font-family="monospace">status</text>
  <text x="45" y="210" font-size="10" fill="#e8f0fe" font-family="monospace">created_at</text>

  <!-- messages -->
  <rect x="210" y="85" width="160" height="135" rx="8" fill="#34a853"/>
  <rect x="210" y="85" width="160" height="28" rx="8" fill="#34a853"/>
  <rect x="210" y="100" width="160" height="13" fill="#34a853"/>
  <text x="290" y="104" text-anchor="middle" font-size="13" fill="white" font-weight="bold">messages</text>
  <text x="225" y="130" font-size="10" fill="white" font-family="monospace">id (PK)</text>
  <text x="225" y="146" font-size="10" fill="white" font-family="monospace">session_id (FK)</text>
  <text x="225" y="162" font-size="10" fill="white" font-family="monospace">role</text>
  <text x="225" y="178" font-size="10" fill="white" font-family="monospace">content</text>
  <text x="225" y="194" font-size="10" fill="white" font-family="monospace">tokens</text>
  <text x="225" y="210" font-size="10" fill="white" font-family="monospace">created_at</text>

  <!-- usage -->
  <rect x="390" y="85" width="160" height="135" rx="8" fill="#fbbc04"/>
  <rect x="390" y="85" width="160" height="28" rx="8" fill="#fbbc04"/>
  <rect x="390" y="100" width="160" height="13" fill="#fbbc04"/>
  <text x="470" y="104" text-anchor="middle" font-size="13" fill="#202124" font-weight="bold">usage</text>
  <text x="405" y="130" font-size="10" fill="#202124" font-family="monospace">id (PK)</text>
  <text x="405" y="146" font-size="10" fill="#202124" font-family="monospace">session_id (FK)</text>
  <text x="405" y="162" font-size="10" fill="#202124" font-family="monospace">input_tokens</text>
  <text x="405" y="178" font-size="10" fill="#202124" font-family="monospace">output_tokens</text>
  <text x="405" y="194" font-size="10" fill="#202124" font-family="monospace">model</text>
  <text x="405" y="210" font-size="10" fill="#202124" font-family="monospace">cost</text>

  <!-- tool_usage -->
  <rect x="570" y="85" width="210" height="135" rx="8" fill="#ea4335"/>
  <rect x="570" y="85" width="210" height="28" rx="8" fill="#ea4335"/>
  <rect x="570" y="100" width="210" height="13" fill="#ea4335"/>
  <text x="675" y="104" text-anchor="middle" font-size="13" fill="white" font-weight="bold">tool_usage</text>
  <text x="585" y="130" font-size="10" fill="white" font-family="monospace">id (PK)</text>
  <text x="585" y="146" font-size="10" fill="white" font-family="monospace">session_id (FK)</text>
  <text x="585" y="162" font-size="10" fill="white" font-family="monospace">tool_name</text>
  <text x="585" y="178" font-size="10" fill="white" font-family="monospace">input_args</text>
  <text x="585" y="194" font-size="10" fill="white" font-family="monospace">output_result</text>
  <text x="585" y="210" font-size="10" fill="white" font-family="monospace">duration_ms</text>

  <!-- automations -->
  <rect x="80" y="260" width="170" height="135" rx="8" fill="#7b1fa2"/>
  <rect x="80" y="260" width="170" height="28" rx="8" fill="#7b1fa2"/>
  <rect x="80" y="275" width="170" height="13" fill="#7b1fa2"/>
  <text x="165" y="279" text-anchor="middle" font-size="13" fill="white" font-weight="bold">automations</text>
  <text x="95" y="305" font-size="10" fill="#e8e0f0" font-family="monospace">id (PK)</text>
  <text x="95" y="321" font-size="10" fill="#e8e0f0" font-family="monospace">name</text>
  <text x="95" y="337" font-size="10" fill="#e8e0f0" font-family="monospace">prompt</text>
  <text x="95" y="353" font-size="10" fill="#e8e0f0" font-family="monospace">rrule</text>
  <text x="95" y="369" font-size="10" fill="#e8e0f0" font-family="monospace">schedule_type</text>
  <text x="95" y="385" font-size="10" fill="#e8e0f0" font-family="monospace">status</text>

  <!-- automation_runs -->
  <rect x="280" y="260" width="170" height="135" rx="8" fill="#7b1fa2" opacity="0.85"/>
  <rect x="280" y="260" width="170" height="28" rx="8" fill="#7b1fa2"/>
  <rect x="280" y="275" width="170" height="13" fill="#7b1fa2"/>
  <text x="365" y="279" text-anchor="middle" font-size="12" fill="white" font-weight="bold">automation_runs</text>
  <text x="295" y="305" font-size="10" fill="#e8e0f0" font-family="monospace">id (PK)</text>
  <text x="295" y="321" font-size="10" fill="#e8e0f0" font-family="monospace">automation_id (FK)</text>
  <text x="295" y="337" font-size="10" fill="#e8e0f0" font-family="monospace">started_at</text>
  <text x="295" y="353" font-size="10" fill="#e8e0f0" font-family="monospace">finished_at</text>
  <text x="295" y="369" font-size="10" fill="#e8e0f0" font-family="monospace">status</text>
  <text x="295" y="385" font-size="10" fill="#e8e0f0" font-family="monospace">result</text>

  <!-- automation_runtime_state -->
  <rect x="480" y="260" width="290" height="135" rx="8" fill="#7b1fa2" opacity="0.7"/>
  <rect x="480" y="260" width="290" height="28" rx="8" fill="#7b1fa2"/>
  <rect x="480" y="275" width="290" height="13" fill="#7b1fa2"/>
  <text x="625" y="279" text-anchor="middle" font-size="12" fill="white" font-weight="bold">automation_runtime_state</text>
  <text x="495" y="305" font-size="10" fill="#e8e0f0" font-family="monospace">id (PK)</text>
  <text x="495" y="321" font-size="10" fill="#e8e0f0" font-family="monospace">automation_id (FK)</text>
  <text x="495" y="337" font-size="10" fill="#e8e0f0" font-family="monospace">last_run_at</text>
  <text x="495" y="353" font-size="10" fill="#e8e0f0" font-family="monospace">next_run_at</text>
  <text x="495" y="369" font-size="10" fill="#e8e0f0" font-family="monospace">last_error</text>
  <text x="495" y="385" font-size="10" fill="#e8e0f0" font-family="monospace">consecutive_failures</text>

  <!-- Relationships -->
  <line x1="190" y1="152" x2="210" y2="152" stroke="#1a73e8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="370" y1="152" x2="390" y2="152" stroke="#1a73e8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="550" y1="152" x2="570" y2="152" stroke="#1a73e8" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <text x="200" y="145" text-anchor="middle" font-size="9" fill="#1a73e8">1:N</text>
  <text x="380" y="145" text-anchor="middle" font-size="9" fill="#1a73e8">1:N</text>
  <text x="560" y="145" text-anchor="middle" font-size="9" fill="#1a73e8">1:N</text>

  <!-- automations relationships -->
  <line x1="250" y1="327" x2="280" y2="327" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="327" x2="480" y2="327" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DB file -->
  <rect x="100" y="420" width="600" height="55" rx="8" fill="#202124"/>
  <text x="400" y="443" text-anchor="middle" font-size="14" fill="white" font-weight="bold">~/.workbuddy/database.db</text>
  <text x="400" y="462" text-anchor="middle" font-size="11" fill="#e8f0fe">7 张表 · WAL 模式 (读写并发) · 外键关联 · 自动迁移</text>
</svg>
