<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a73e8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#34a853"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ea4335"/>
    </marker>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #202124; }
      .subtitle { font-size: 13px; fill: #5f6368; }
      .node-title { font-size: 15px; font-weight: 700; }
      .node-sub { font-size: 11px; }
      .label { font-size: 11px; font-weight: 700; fill: #ffffff; }
      .hint { font-size: 12px; fill: #5f6368; }
    </style>
  </defs>

  <rect width="900" height="560" fill="#f8f9fa"/>
  <rect x="28" y="72" width="844" height="410" rx="18" fill="#ffffff" stroke="#dadce0" stroke-width="1"/>

  <text x="450" y="38" text-anchor="middle" class="title">Agent Loop 核心循环</text>
  <text x="450" y="60" text-anchor="middle" class="subtitle">模型决定下一步；Harness 执行工具、写回 messages，并继续下一轮</text>

  <path d="M230 124 L278 124" fill="none" stroke="#1a73e8" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
  <path d="M450 124 L498 124" fill="none" stroke="#1a73e8" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
  <path d="M670 124 L680 124" fill="none" stroke="#1a73e8" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
  <path d="M760 176 L760 230 L585 230 L585 374" fill="none" stroke="#34a853" stroke-width="2.4" marker-end="url(#arrow-green)"/>
  <path d="M500 408 L452 408" fill="none" stroke="#34a853" stroke-width="2.4" marker-end="url(#arrow-green)"/>
  <path d="M365 376 L365 158" fill="none" stroke="#1a73e8" stroke-width="2.4" stroke-dasharray="7 5" marker-end="url(#arrow-blue)"/>
  <path d="M838 124 L862 124 L862 318 L848 318" fill="none" stroke="#ea4335" stroke-width="2.4" marker-end="url(#arrow-red)"/>

  <rect x="648" y="218" width="78" height="24" rx="12" fill="#34a853"/>
  <text x="687" y="234" text-anchor="middle" class="label">tool_use</text>

  <rect x="807" y="214" width="78" height="24" rx="12" fill="#ea4335"/>
  <text x="846" y="230" text-anchor="middle" class="label">end_turn</text>

  <rect x="384" y="252" width="138" height="28" rx="14" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1"/>
  <text x="453" y="271" text-anchor="middle" font-size="11" font-weight="700" fill="#1a73e8">下一轮 messages</text>

  <rect x="60" y="92" width="170" height="64" rx="10" fill="#1a73e8"/>
  <text x="145" y="119" text-anchor="middle" class="node-title" fill="#ffffff">用户输入</text>
  <text x="145" y="139" text-anchor="middle" class="node-sub" fill="#d6e4ff">new user message</text>

  <rect x="280" y="92" width="170" height="64" rx="10" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.6"/>
  <text x="365" y="119" text-anchor="middle" class="node-title" fill="#1a73e8">messages</text>
  <text x="365" y="139" text-anchor="middle" class="node-sub" fill="#5f6368">历史 + 工具结果</text>

  <rect x="500" y="92" width="170" height="64" rx="10" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.6"/>
  <text x="585" y="119" text-anchor="middle" class="node-title" fill="#1a73e8">模型调用</text>
  <text x="585" y="139" text-anchor="middle" class="node-sub" fill="#5f6368">LLM(messages, tools)</text>

  <g transform="translate(760 124)">
    <polygon points="0,-52 78,0 0,52 -78,0" fill="#fff8e1" stroke="#fbbc04" stroke-width="2"/>
    <text y="-5" text-anchor="middle" font-size="14" font-weight="700" fill="#202124">stop_reason?</text>
    <text y="15" text-anchor="middle" font-size="10.5" fill="#5f6368">tool_use / end_turn</text>
  </g>

  <rect x="500" y="376" width="170" height="64" rx="10" fill="#34a853"/>
  <text x="585" y="403" text-anchor="middle" class="node-title" fill="#ffffff">执行工具</text>
  <text x="585" y="423" text-anchor="middle" class="node-sub" fill="#d7f5df">read / bash / search</text>

  <rect x="280" y="376" width="170" height="64" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="1.6"/>
  <text x="365" y="403" text-anchor="middle" class="node-title" fill="#188038">写回 tool_result</text>
  <text x="365" y="423" text-anchor="middle" class="node-sub" fill="#5f6368">append to messages</text>

  <rect x="675" y="286" width="170" height="64" rx="32" fill="#fce8e6" stroke="#ea4335" stroke-width="1.8"/>
  <text x="760" y="313" text-anchor="middle" class="node-title" fill="#ea4335">输出最终回答</text>
  <text x="760" y="333" text-anchor="middle" class="node-sub" fill="#5f6368">break loop</text>

  <rect x="64" y="506" width="12" height="12" rx="2" fill="#1a73e8"/>
  <text x="82" y="517" font-size="11" fill="#5f6368">主推理路径</text>
  <rect x="170" y="506" width="12" height="12" rx="2" fill="#34a853"/>
  <text x="188" y="517" font-size="11" fill="#5f6368">工具执行分支</text>
  <rect x="292" y="506" width="12" height="12" rx="2" fill="#ea4335"/>
  <text x="310" y="517" font-size="11" fill="#5f6368">结束分支</text>
  <text x="820" y="517" text-anchor="end" class="hint">while True: call model -> maybe run tools -> append results</text>
</svg>
