<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a73e8"/>
    </marker>
    <linearGradient id="shield-outer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ea4335"/>
      <stop offset="100%" stop-color="#c5221f"/>
    </linearGradient>
    <linearGradient id="shield-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbc04"/>
      <stop offset="100%" stop-color="#d99e00"/>
    </linearGradient>
    <linearGradient id="shield-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34a853"/>
      <stop offset="100%" stop-color="#188038"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#202124">macOS 沙盒安全分层</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#5f6368">三层纵深防御，从内核到用户逐级守护</text>

  <!-- Castle/shield metaphor - 3 nested layers -->

  <!-- ===== Outer Layer: macOS App Sandbox ===== -->
  <!-- Shield shape (large) -->
  <path d="M 60 90 L 740 90 L 740 300 Q 740 380, 400 460 Q 60 380, 60 300 Z"
        fill="url(#shield-outer)" opacity="0.08" stroke="#ea4335" stroke-width="2"/>
  <path d="M 70 100 L 730 100 L 730 298 Q 730 374, 400 450 Q 70 374, 70 298 Z"
        fill="none" stroke="#ea4335" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.4"/>

  <!-- Outer layer label -->
  <rect x="80" y="110" width="240" height="36" rx="8" fill="#ea4335"/>
  <text x="100" y="134" font-size="16" font-weight="700" fill="#ffffff">🛡 第一层：内核级</text>
  <text x="340" y="134" font-size="14" font-weight="600" fill="#ea4335">macOS App Sandbox</text>

  <!-- Outer layer content -->
  <rect x="90" y="156" width="620" height="56" rx="8" fill="#ffffff" stroke="#ea4335" stroke-width="1.5"/>
  <g font-size="11">
    <rect x="105" y="170" width="130" height="30" rx="6" fill="#fce8e6"/><text x="170" y="189" text-anchor="middle" fill="#ea4335" font-weight="600">App Sandbox</text>
    <rect x="245" y="170" width="130" height="30" rx="6" fill="#fce8e6"/><text x="310" y="189" text-anchor="middle" fill="#ea4335" font-weight="600">Entitlements</text>
    <rect x="385" y="170" width="150" height="30" rx="6" fill="#fce8e6"/><text x="460" y="189" text-anchor="middle" fill="#ea4335" font-weight="600">FileProvider API</text>
    <rect x="545" y="170" width="150" height="30" rx="6" fill="#fce8e6"/><text x="620" y="189" text-anchor="middle" fill="#ea4335" font-weight="600">NetworkExtension</text>
  </g>

  <!-- ===== Middle Layer: WorkBuddy 沙盒 ===== -->
  <!-- Shield shape (medium) -->
  <path d="M 120 220 L 680 220 L 680 330 Q 680 390, 400 440 Q 120 390, 120 330 Z"
        fill="url(#shield-mid)" opacity="0.1" stroke="#fbbc04" stroke-width="2"/>

  <!-- Middle layer label -->
  <rect x="140" y="232" width="240" height="36" rx="8" fill="#fbbc04"/>
  <text x="160" y="256" font-size="16" font-weight="700" fill="#202124">🛡 第二层：应用级</text>
  <text x="400" y="256" font-size="14" font-weight="600" fill="#b06000">WorkBuddy 沙盒</text>

  <!-- Middle layer content -->
  <rect x="150" y="278" width="500" height="56" rx="8" fill="#ffffff" stroke="#fbbc04" stroke-width="1.5"/>
  <g font-size="12">
    <rect x="170" y="292" width="200" height="30" rx="6" fill="#fef7e0"/><text x="270" y="311" text-anchor="middle" fill="#b06000" font-weight="600">sandbox-config.json</text>
    <rect x="380" y="292" width="140" height="30" rx="6" fill="#fef7e0"/><text x="450" y="311" text-anchor="middle" fill="#b06000" font-weight="600">Path Whitelist</text>
    <rect x="530" y="292" width="150" height="30" rx="6" fill="#fef7e0"/><text x="605" y="311" text-anchor="middle" fill="#b06000" font-weight="600">Command Blacklist</text>
  </g>

  <!-- ===== Inner Layer: 权限审批 ===== -->
  <!-- Shield shape (small) -->
  <path d="M 200 348 L 600 348 L 600 375 Q 600 405, 400 430 Q 200 405, 200 375 Z"
        fill="url(#shield-inner)" opacity="0.12" stroke="#34a853" stroke-width="2"/>

  <!-- Inner layer label -->
  <rect x="220" y="352" width="220" height="32" rx="8" fill="#34a853"/>
  <text x="240" y="373" font-size="15" font-weight="700" fill="#ffffff">🛡 第三层：用户级</text>
  <text x="460" y="373" font-size="14" font-weight="600" fill="#137333">权限审批</text>

  <!-- Inner layer content -->
  <rect x="220" y="392" width="360" height="38" rx="8" fill="#ffffff" stroke="#34a853" stroke-width="1.5"/>
  <g font-size="12">
    <rect x="232" y="400" width="70" height="22" rx="6" fill="#e6f4ea"/><text x="267" y="415" text-anchor="middle" fill="#137333" font-weight="600">ask</text>
    <rect x="310" y="400" width="70" height="22" rx="6" fill="#e6f4ea"/><text x="345" y="415" text-anchor="middle" fill="#137333" font-weight="600">allow</text>
    <rect x="388" y="400" width="70" height="22" rx="6" fill="#e6f4ea"/><text x="423" y="415" text-anchor="middle" fill="#137333" font-weight="600">deny</text>
    <rect x="466" y="400" width="100" height="22" rx="6" fill="#e6f4ea"/><text x="516" y="415" text-anchor="middle" fill="#137333" font-weight="600">MCP Trust</text>
  </g>

  <!-- Defense arrows on right side -->
  <rect x="660" y="120" width="120" height="80" rx="8" fill="#ffffff" stroke="#dadce0"/>
  <text x="720" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#ea4335">内核强制隔离</text>
  <text x="720" y="158" text-anchor="middle" font-size="10" fill="#5f6368">进程/文件/网络</text>
  <text x="720" y="174" text-anchor="middle" font-size="10" fill="#5f6368">系统级强制</text>
  <text x="720" y="190" text-anchor="middle" font-size="10" fill="#5f6368">无法绕过</text>

  <rect x="660" y="240" width="120" height="80" rx="8" fill="#ffffff" stroke="#dadce0"/>
  <text x="720" y="260" text-anchor="middle" font-size="11" font-weight="700" fill="#b06000">应用规则引擎</text>
  <text x="720" y="278" text-anchor="middle" font-size="10" fill="#5f6368">路径白名单</text>
  <text x="720" y="294" text-anchor="middle" font-size="10" fill="#5f6368">命令黑名单</text>
  <text x="720" y="310" text-anchor="middle" font-size="10" fill="#5f6368">配置驱动</text>

  <rect x="660" y="360" width="120" height="60" rx="8" fill="#ffffff" stroke="#dadce0"/>
  <text x="720" y="380" text-anchor="middle" font-size="11" font-weight="700" fill="#137333">用户授权</text>
  <text x="720" y="398" text-anchor="middle" font-size="10" fill="#5f6368">交互式审批</text>
  <text x="720" y="414" text-anchor="middle" font-size="10" fill="#5f6368">最小权限</text>

  <!-- Bottom: Defense in depth label -->
  <rect x="60" y="460" width="680" height="30" rx="6" fill="#202124"/>
  <text x="400" y="480" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">纵深防御 (Defense in Depth) —— 外层被突破时，内层仍可拦截</text>
</svg>
