  <text x="60" y="258" text-anchor="middle" font-size="10" fill="white" font-weight="bold">s17 MCP连接器</text>
  <text x="60" y="272" text-anchor="middle" font-size="8" fill="white">MCP Connectors</text>

  <!-- 记忆层 (blue) -->
  <rect x="120" y="422" width="100" height="36" rx="6" fill="#1a73e8"/>
  <text x="170" y="438" text-anchor="middle" font-size="10" fill="white" font-weight="bold">s10 工作区记忆</text>
  <text x="170" y="452" text-anchor="middle" font-size="8" fill="white">Workspace Memory</text>

  <rect x="30" y="352" width="100" height="36" rx="6" fill="#1a73e8"/>
  <text x="80" y="368" text-anchor="middle" font-size="10" fill="white" font-weight="bold">s11 用户记忆</text>
  <text x="80" y="382" text-anchor="middle" font-size="8" fill="white">User Memory</text>

  <rect x="10" y="292" width="100" height="36" rx="6" fill="#1a73e8"/>
  <text x="60" y="308" text-anchor="middle" font-size="10" fill="white" font-weight="bold">s12 云端记忆</text>
  <text x="60" y="322" text-anchor="middle" font-size="8" fill="white">Cloud Memory</text>

  <rect x="580" y="422" width="100" height="36" rx="6" fill="#1a73e8"/>
