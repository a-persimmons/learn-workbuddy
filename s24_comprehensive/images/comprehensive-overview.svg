  <text x="720" y="142" text-anchor="middle" font-size="8" fill="white">Permission Hooks</text>

  <rect x="690" y="182" width="100" height="36" rx="6" fill="#ea4335"/>
  <text x="740" y="198" text-anchor="middle" font-size="10" fill="white" font-weight="bold">s23 审计沙箱</text>
  <text x="740" y="212" text-anchor="middle" font-size="8" fill="white">Audit Sandbox</text>

  <rect x="690" y="242" width="100" height="36" rx="6" fill="#ea4335"/>
