  <line x1="400" y1="250" x2="80" y2="440" stroke="#7b1fa2" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="250" y2="460" stroke="#7b1fa2" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="550" y2="460" stroke="#7b1fa2" stroke-width="1.5" opacity="0.3"/>

