  <line x1="400" y1="250" x2="400" y2="450" stroke="#0097a7" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="300" y2="60" stroke="#0097a7" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="500" y2="60" stroke="#0097a7" stroke-width="1.5" opacity="0.3"/>

