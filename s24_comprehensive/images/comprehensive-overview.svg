<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="sans-serif">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a73e8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a73e8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="#f8f9fa"/>

  <text x="400" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#202124">24 课全景 — 一个循环</text>

  <!-- Center glow -->
  <circle cx="400" cy="250" r="200" fill="url(#centerGlow)"/>

  <!-- Spokes (lines from center to each node) -->
  <!-- Layer 1: 工具层 (green) - 4 items -->
  <line x1="400" y1="250" x2="170" y2="60" stroke="#34a853" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="80" y2="130" stroke="#34a853" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="60" y2="200" stroke="#34a853" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="60" y2="260" stroke="#34a853" stroke-width="1.5" opacity="0.3"/>

  <!-- Layer 2: 记忆层 (blue) - 4 items -->
  <line x1="400" y1="250" x2="170" y2="440" stroke="#1a73e8" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="80" y2="370" stroke="#1a73e8" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="60" y2="310" stroke="#1a73e8" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="630" y2="440" stroke="#1a73e8" stroke-width="1.5" opacity="0.3"/>

  <!-- Layer 3: 安全层 (red) - 3 items -->
  <line x1="400" y1="250" x2="720" y2="130" stroke="#ea4335" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="740" y2="200" stroke="#ea4335" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="740" y2="260" stroke="#ea4335" stroke-width="1.5" opacity="0.3"/>

  <!-- Layer 4: 持久层 (yellow) - 3 items -->
  <line x1="400" y1="250" x2="630" y2="60" stroke="#fbbc04" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="720" y2="370" stroke="#fbbc04" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="250" x2="740" y2="310" stroke="#fbbc04" stroke-width="1.5" opacity="0.3"/>

