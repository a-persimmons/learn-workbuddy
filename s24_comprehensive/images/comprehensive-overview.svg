  <text x="80" y="438" text-anchor="middle" font-size="10" fill="white" font-weight="bold">s05 Electron</text>
  <text x="80" y="452" text-anchor="middle" font-size="8" fill="white">Shell</text>

  <rect x="200" y="452" width="100" height="36" rx="6" fill="#7b1fa2"/>
  <text x="250" y="468" text-anchor="middle" font-size="10" fill="white" font-weight="bold">s06 Sidecar</text>
  <text x="250" y="482" text-anchor="middle" font-size="8" fill="white">Server</text>

