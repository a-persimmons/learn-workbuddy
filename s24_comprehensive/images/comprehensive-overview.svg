  <text x="400" y="62" text-anchor="middle" font-size="8" fill="white">Assembly</text>

  <rect x="250" y="42" width="100" height="36" rx="6" fill="#0097a7"/>
  <text x="300" y="58" text-anchor="middle" font-size="10" fill="white" font-weight="bold">s13 输出外化</text>
  <text x="300" y="72" text-anchor="middle" font-size="8" fill="white">Output External.</text>

  <rect x="450" y="42" width="100" height="36" rx="6" fill="#0097a7"/>
  <text x="500" y="58" text-anchor="middle" font-size="10" fill="white" font-weight="bold">s18 专家系统</text>
  <text x="500" y="72" text-anchor="middle" font-size="8" fill="white">Experts System</text>

  <rect x="350" y="432" width="100" height="36" rx="6" fill="#0097a7"/>
  <text x="400" y="448" text-anchor="middle" font-size="10" fill="white" font-weight="bold">s19 可视化</text>
  <text x="400" y="462" text-anchor="middle" font-size="8" fill="white">Visualizer</text>

  <!-- Missing s20, s24 - add them -->
  <rect x="450" y="432" width="100" height="36" rx="6" fill="#0097a7"/>
  <text x="500" y="448" text-anchor="middle" font-size="10" fill="white" font-weight="bold">s20 结果交付</text>
  <text x="500" y="462" text-anchor="middle" font-size="8" fill="white">Result Present.</text>

  <rect x="250" y="432" width="100" height="36" rx="6" fill="#0097a7"/>
  <text x="300" y="448" text-anchor="middle" font-size="10" fill="white" font-weight="bold">s24 全景总结</text>
  <text x="300" y="462" text-anchor="middle" font-size="8" fill="white">Comprehensive</text>

  <!-- Legend -->
  <rect x="350" y="490" width="100" height="6" rx="3" fill="none"/>

  <!-- Legend at bottom -->
  <circle cx="30" cy="490" r="5" fill="#34a853"/>
  <text x="40" y="494" font-size="9" fill="#202124">工具层</text>

  <circle cx="100" cy="490" r="5" fill="#1a73e8"/>
  <text x="110" y="494" font-size="9" fill="#202124">记忆层</text>

  <circle cx="170" cy="490" r="5" fill="#ea4335"/>
  <text x="180" y="494" font-size="9" fill="#202124">安全层</text>

  <circle cx="240" cy="490" r="5" fill="#fbbc04"/>
  <text x="250" y="494" font-size="9" fill="#202124">持久层</text>

  <circle cx="310" cy="490" r="5" fill="#7b1fa2"/>
  <text x="320" y="494" font-size="9" fill="#202124">进程层</text>

  <circle cx="380" cy="490" r="5" fill="#0097a7"/>
  <text x="390" y="494" font-size="9" fill="#202124">交互层</text>

  <text x="440" y="494" font-size="9" fill="#202124" font-style="italic">所有机制围绕 Agent Loop 运转</text>
</svg>
