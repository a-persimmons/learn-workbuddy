<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a73e8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#34a853"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ea4335"/>
    </marker>
    <linearGradient id="ram-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0fe"/>
      <stop offset="100%" stop-color="#d6e4ff"/>
    </linearGradient>
    <linearGradient id="disk-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f4ea"/>
      <stop offset="100%" stop-color="#c6f6d5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#202124">工具输出外部化 (Output Swap)</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#5f6368">类操作系统内存交换：大输出写磁盘，上下文只存指针</text>

  <!-- ===== LEFT: 上下文窗口 (RAM) ===== -->
  <rect x="40" y="110" width="280" height="200" rx="12" fill="url(#ram-grad)" stroke="#1a73e8" stroke-width="2"/>
  <!-- RAM icon header -->
  <rect x="40" y="110" width="280" height="38" rx="12" fill="#1a73e8"/>
  <rect x="40" y="130" width="280" height="18" fill="#1a73e8"/>
  <text x="180" y="134" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">⚡ 上下文窗口 (RAM)</text>

  <!-- Small content -->
  <text x="60" y="170" font-size="12" font-weight="600" fill="#1a73e8">内容 (精简)</text>
  <rect x="60" y="180" width="240" height="40" rx="6" fill="#ffffff" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="180" y="197" text-anchor="middle" font-size="11" fill="#5f6368" font-family="monospace">指针 → tool-results/abc123.txt</text>
  <text x="180" y="213" text-anchor="middle" font-size="11" fill="#5f6368" font-family="monospace">+ 6KB 预览 (前几行)</text>

  <!-- Stats -->
  <rect x="60" y="232" width="100" height="28" rx="6" fill="#ffffff" stroke="#dadce0"/>
  <text x="110" y="250" text-anchor="middle" font-size="11" fill="#5f6368">占用: ~6KB</text>
  <rect x="170" y="232" width="130" height="28" rx="6" fill="#ffffff" stroke="#dadce0"/>
  <text x="235" y="250" text-anchor="middle" font-size="11" fill="#34a853">✓ 省空间</text>

  <text x="180" y="285" text-anchor="middle" font-size="11" fill="#5f6368" font-style="italic">LLM 上下文中的表示</text>
  <text x="180" y="300" text-anchor="middle" font-size="10" fill="#5f6368">快速访问，低延迟</text>

  <!-- ===== MIDDLE: Swap arrow ===== -->
  <!-- Page fault arrow -->
  <path d="M 325 210 L 465 210" fill="none" stroke="#fbbc04" stroke-width="3" stroke-dasharray="6 3" marker-end="url(#arrow-green)"/>
  <rect x="335" y="175" width="120" height="28" rx="14" fill="#fbbc04"/>
  <text x="395" y="194" text-anchor="middle" font-size="12" font-weight="600" fill="#202124">缺页中断</text>
  <text x="395" y="226" text-anchor="middle" font-size="11" fill="#5f6368">Read 工具按需读取</text>
  <text x="395" y="240" text-anchor="middle" font-size="10" fill="#5f6368" font-style="italic">page fault → swap in</text>

  <!-- Reverse arrow (write to disk) -->
  <path d="M 465 270 L 325 270" fill="none" stroke="#1a73e8" stroke-width="2.5" stroke-dasharray="4 3" marker-end="url(#arrow-blue)"/>
  <text x="395" y="262" text-anchor="middle" font-size="11" fill="#1a73e8">输出写入磁盘 (swap out)</text>

  <!-- ===== RIGHT: 磁盘 (Swap) ===== -->
  <rect x="475" y="110" width="285" height="200" rx="12" fill="url(#disk-grad)" stroke="#34a853" stroke-width="2"/>
  <rect x="475" y="110" width="285" height="38" rx="12" fill="#34a853"/>
  <rect x="475" y="130" width="285" height="18" fill="#34a853"/>
  <text x="617" y="134" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">💾 磁盘 (Swap)</text>

  <!-- File content -->
  <text x="495" y="170" font-size="12" font-weight="600" fill="#137333">完整工具输出</text>
  <rect x="495" y="180" width="245" height="72" rx="6" fill="#ffffff" stroke="#34a853" stroke-width="1.5"/>
  <text x="505" y="197" font-size="10" fill="#202124" font-family="monospace">📄 tool-results/abc123.txt</text>
  <text x="505" y="214" font-size="9" fill="#5f6368" font-family="monospace">line 1: Reading file /src/app.py</text>
  <text x="505" y="228" font-size="9" fill="#5f6368" font-family="monospace">line 2: import os, sys</text>
  <text x="505" y="242" font-size="9" fill="#5f6368" font-family="monospace">line 3: def main():</text>
  <text x="730" y="248" text-anchor="end" font-size="10" fill="#34a853" font-weight="600">...30KB+</text>

  <!-- Stats -->
  <rect x="495" y="262" width="110" height="28" rx="6" fill="#ffffff" stroke="#dadce0"/>
  <text x="550" y="280" text-anchor="middle" font-size="11" fill="#5f6368">存储: 30KB+</text>
  <rect x="615" y="262" width="125" height="28" rx="6" fill="#ffffff" stroke="#dadce0"/>
  <text x="677" y="280" text-anchor="middle" font-size="11" fill="#5f6368">持久化存储</text>

  <!-- ===== BOTTOM: Threshold rules ===== -->
  <rect x="40" y="340" width="720" height="140" rx="12" fill="#ffffff" stroke="#dadce0" stroke-width="1.5"/>
  <text x="60" y="365" font-size="14" font-weight="700" fill="#202124">阈值规则 (Threshold)</text>

  <!-- Rule 1: > 30KB -->
  <rect x="60" y="380" width="330" height="85" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <rect x="60" y="380" width="6" height="85" rx="3" fill="#34a853"/>
  <text x="80" y="403" font-size="14" font-weight="700" fill="#34a853">输出 &gt; 30KB</text>
  <text x="80" y="423" font-size="12" fill="#5f6368">→ 写入磁盘 (Swap out)</text>
  <text x="80" y="441" font-size="11" fill="#5f6368">上下文只保留指针 + 6KB 预览</text>
  <text x="80" y="457" font-size="11" fill="#5f6368">LLM 需要时用 Read 按需加载</text>

  <!-- Rule 2: < 30KB -->
  <rect x="410" y="380" width="330" height="85" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <rect x="410" y="380" width="6" height="85" rx="3" fill="#1a73e8"/>
  <text x="430" y="403" font-size="14" font-weight="700" fill="#1a73e8">输出 &lt; 30KB</text>
  <text x="430" y="423" font-size="12" fill="#5f6368">→ 直接进入上下文</text>
  <text x="430" y="441" font-size="11" fill="#5f6368">完整内容保留在 messages 中</text>
  <text x="430" y="457" font-size="11" fill="#5f6368">无需外部化，即时可访问</text>
</svg>
